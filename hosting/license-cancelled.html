<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assinatura cancelada · Halex Istar CRM</title>
  <style>
    :root {
      --lx-bg: oklch(0.975 0.006 82);
      --lx-bg-soft: oklch(0.955 0.008 80);
      --lx-ink: oklch(0.18 0.012 60);
      --lx-ink-2: oklch(0.32 0.010 65);
      --lx-ink-3: oklch(0.52 0.008 70);
      --lx-gold: oklch(0.78 0.13 78);
      --lx-gold-deep: oklch(0.62 0.14 68);
      --lx-gold-light: oklch(0.92 0.06 85);
      --lx-hair: oklch(0.18 0.012 60 / 0.10);
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      font-family: system-ui, "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--lx-ink);
      background:
        radial-gradient(ellipse 58% 44% at 84% -10%, oklch(0.85 0.10 78 / 0.32), transparent 70%),
        radial-gradient(ellipse 52% 42% at 6% 110%, oklch(0.92 0.06 85 / 0.5), transparent 72%),
        linear-gradient(180deg, var(--lx-bg) 0%, var(--lx-bg-soft) 58%, var(--lx-bg) 100%);
      background-attachment: fixed;
    }
    .card {
      width: 100%; max-width: 460px; padding: 34px 32px 28px; text-align: center;
      background: oklch(1 0 0 / 0.82);
      border: 1px solid var(--lx-hair);
      border-radius: 1.1rem;
      box-shadow: 0 34px 80px -46px oklch(0.3 0.05 60 / 0.45);
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 22px; }
    .mark {
      display: grid; place-items: center; width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--lx-gold-deep), var(--lx-gold) 52%, var(--lx-gold-light));
      color: oklch(0.22 0.03 62);
      box-shadow: 0 10px 24px -12px oklch(0.62 0.14 68 / 0.75);
    }
    .wordmark { font-weight: 650; letter-spacing: -0.02em; font-size: 1.05rem; color: var(--lx-ink); }
    .wordmark em { font-style: normal; font-weight: 400; color: var(--lx-ink-3); }
    .kicker { margin: 0 0 6px; font-size: 0.6rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--lx-gold-deep); }
    h1 { font-size: 21px; margin: 0 0 8px; letter-spacing: -0.02em; color: var(--lx-ink); }
    p { color: var(--lx-ink-2); font-size: 14px; line-height: 1.6; margin: 8px 0; }
    .footer { margin-top: 22px; font-size: 11px; color: var(--lx-ink-3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </span>
      <span class="wordmark">Almeida <em>Lumina</em></span>
    </div>

    <p class="kicker">Halex Istar CRM</p>
    <h1>Assinatura não concluída</h1>
    <p>Nenhuma cobrança foi feita. Você pode fechar esta janela e tentar novamente pelo aplicativo quando quiser.</p>

    <div class="footer">© <span id="year"></span> Almeida Lumina · Ativação segura</div>
  </div>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
